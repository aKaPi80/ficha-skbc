<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Ficha SKBC</title>

  <!-- Icono del club para pantalla de inicio -->
  <link rel="apple-touch-icon" href="https://i.imgur.com/RhmHE0p.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mi Ficha SKBC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">

  <style>
    body {
      margin: 0;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }
    img { width: 80px; border-radius: 50%; margin-bottom: 16px; }
    p { color: #94a3b8; font-size: 14px; }
  </style>

  <script>
    // Lee los parámetros de la URL y redirige a la ficha GAS
    var params = window.location.search;
    var FICHA_URL = 'https://script.google.com/macros/s/AKfycbzeaiDRl6KXB-_g5QEH7NjMXALejGHBtAgoavSCSX-lIsamLApcybJ_JViKia2kTYtA/exec';

    if (params) {
      window.location.replace(FICHA_URL + params);
    }
  </script>

  <!-- Manifest PWA con icono real -->
  <script>
    var id    = new URLSearchParams(window.location.search).get('id')    || '';
    var token = new URLSearchParams(window.location.search).get('token') || '';
    var fichaUrl = 'https://script.google.com/macros/s/AKfycbzeaiDRl6KXB-_g5QEH7NjMXALejGHBtAgoavSCSX-lIsamLApcybJ_JViKia2kTYtA/exec?id=' + id + '&token=' + token;

    var manifest = {
      name: "Mi Ficha SKBC Gipuzkoa",
      short_name: "Mi Ficha",
      display: "standalone",
      background_color: "#0f172a",
      theme_color: "#0f172a",
      start_url: window.location.href,
      icons: [
        { src: "https://i.imgur.com/RhmHE0p.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: "https://i.imgur.com/RhmHE0p.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
    };

    var blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
    var link = document.createElement("link");
    link.rel = "manifest";
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);

    if ("serviceWorker" in navigator) {
      try {
        var sw = 'self.addEventListener("install",e=>{e.waitUntil(self.skipWaiting())});self.addEventListener("activate",e=>{e.waitUntil(self.clients.claim())});self.addEventListener("fetch",e=>{});';
        var swBlob = new Blob([sw], {type: "application/javascript"});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(function(){});
      } catch(e) {}
    }
  </script>
</head>
<body>
  <div>
    <img src="https://i.imgur.com/RhmHE0p.png" alt="SKBC Logo">
    <p>Cargando tu ficha...</p>
  </div>
</body>
</html>
