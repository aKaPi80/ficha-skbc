<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Ficha SKBC</title>

  <link rel="apple-touch-icon" href="https://i.imgur.com/RhmHE0p.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Mi Ficha SKBC">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0f172a">

  <script>
    var params = new URLSearchParams(window.location.search);
    var id    = params.get('id')    || '';
    var token = params.get('token') || '';
    var FICHA = 'https://script.google.com/macros/s/AKfycbzeaiDRl6KXB-_g5QEH7NjMXALejGHBtAgoavSCSX-lIsamLApcybJ_JViKia2kTYtA/exec';
    var fichaUrl = FICHA + '?id=' + id + '&token=' + token;

    var manifest = {
      name: "Mi Ficha SKBC Gipuzkoa",
      short_name: "Mi Ficha",
      display: "standalone",
      background_color: "#0f172a",
      theme_color: "#0f172a",
      start_url: window.location.href,
      icons: [
        { src: "https://i.imgur.com/RhmHE0p.png", sizes: "192x192", type: "image/png", purpose: "any maskable" },
        { src: "https://i.imgur.com/RhmHE0p.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }
      ]
    };
    var blob = new Blob([JSON.stringify(manifest)], {type:"application/json"});
    var link = document.createElement("link");
    link.rel = "manifest";
    link.href = URL.createObjectURL(blob);
    document.head.appendChild(link);

    if ("serviceWorker" in navigator) {
      try {
        var sw = 'self.addEventListener("install",e=>{e.waitUntil(self.skipWaiting())});self.addEventListener("activate",e=>{e.waitUntil(self.clients.claim())});self.addEventListener("fetch",e=>{});';
        var swBlob = new Blob([sw], {type:"application/javascript"});
        navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(function(){});
      } catch(e) {}
    }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px 30px;
      text-align: center;
      max-width: 340px;
      width: 100%;
    }
    img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 3px solid rgba(59,130,246,0.5);
      margin-bottom: 20px;
    }
    h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
    p { color: #94a3b8; font-size: 14px; margin-bottom: 32px; line-height: 1.5; }
    .btn {
      display: block;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: white;
      text-decoration: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(37,99,235,0.35);
    }
    .hint {
      color: #64748b;
      font-size: 12px;
      line-height: 1.6;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    .hint strong { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="card">
    <img src="https://i.imgur.com/RhmHE0p.png" alt="SKBC Logo">
    <h1>Mi Ficha SKBC</h1>
    <p>Acceso personal a tu ficha de entrenamiento</p>
    <a class="btn" id="btn-ficha" href="#">🥋 Abrir mi ficha</a>
    <div class="hint">
      <strong>¿Quieres el icono en tu móvil?</strong><br>
      Primero añade esta página a tu pantalla de inicio,<br>
      luego abre la app y pulsa el botón.
    </div>
  </div>

  <script>
    document.getElementById('btn-ficha').href = fichaUrl;
  </script>
</body>
</html>
